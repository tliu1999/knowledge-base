<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>思考库</title>
    <link rel="icon" type="image/svg+xml" href="./assets/knowledge-mark.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="思考库导航">
        <div class="brand-row">
          <img src="./assets/knowledge-mark.svg" alt="" class="brand-mark" />
          <div>
            <h1>思考库</h1>
            <p>这是我的突发奇想，借助Codex帮我记录下来了，愿意的话也可以加入你的呢</p>
          </div>
        </div>

        <section class="control-block">
          <label for="searchInput">检索</label>
          <div class="search-wrap">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜索党员角色、产品经理、AI..." autocomplete="off" />
          </div>
        </section>

        <section class="control-block">
          <label>分类</label>
          <div id="categoryFilters" class="filter-list" role="list"></div>
        </section>

        <section class="control-block">
          <label>标签</label>
          <div id="tagFilters" class="tag-cloud" role="list"></div>
        </section>
      </aside>

      <section class="workspace" aria-label="思考库内容">
        <div class="toolbar">
          <div>
            <p class="eyebrow">Thinking Library</p>
            <h2 id="resultTitle">全部条目</h2>
          </div>
          <div class="stats" aria-live="polite">
            <strong id="resultCount">0</strong>
            <span>条匹配</span>
          </div>
        </div>

        <form id="quickAddForm" class="quick-add" autocomplete="off">
          <div class="form-grid">
            <label>
              问题 / 标题
              <input name="title" required placeholder="写下你正在思考的问题" />
            </label>
            <label>
              分类
              <select name="category" required>
                <option value="自我复盘">自我复盘</option>
                <option value="产品思考">产品思考</option>
                <option value="AI 时代">AI 时代</option>
                <option value="大模型概念">大模型概念</option>
                <option value="机器学习基础">机器学习基础</option>
                <option value="党员角色">党员角色</option>
                <option value="面试题库">面试题库</option>
                <option value="Mac">Mac</option>
                <option value="GitHub / Git">GitHub / Git</option>
                <option value="Shell">Shell</option>
                <option value="其他">其他</option>
              </select>
            </label>
            <label>
              标签
              <input name="tags" placeholder="用逗号分隔，例如 成长, 判断力, 责任" />
            </label>
          </div>
          <label>
            核心想法
            <textarea name="body" required placeholder="写下你的想法，也可以先留一句“还在思考中”"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit">提交给我审核</button>
            <button type="button" id="clearLocalBtn" class="ghost">清空我新增的思考</button>
          </div>
          <p class="form-hint">提交后会打开 GitHub Issue 页面，我审核后再加入正式思考库；你的浏览器里也会先保存一份。</p>
        </form>

        <div id="entries" class="entry-list"></div>
        <p id="emptyState" class="empty-state" hidden>没有找到匹配内容，换个关键词试试。</p>
      </section>
    </main>

    <template id="entryTemplate">
      <article class="entry-card">
        <div class="entry-head">
          <div>
            <p class="entry-category"></p>
            <h3></h3>
          </div>
          <button class="copy-btn" type="button" title="复制条目" aria-label="复制条目">⧉</button>
        </div>
        <p class="entry-body"></p>
        <pre class="entry-code" hidden><code></code></pre>
        <div class="entry-tags"></div>
      </article>
    </template>

    <script src="./data/entries.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
