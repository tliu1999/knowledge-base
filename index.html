<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人知识库</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="知识库导航">
        <div class="brand-row">
          <img src="./assets/knowledge-mark.svg" alt="" class="brand-mark" />
          <div>
            <h1>个人知识库</h1>
            <p>常用问题速查</p>
          </div>
        </div>

        <section class="control-block">
          <label for="searchInput">检索</label>
          <div class="search-wrap">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜索快捷键、git commit、截图..." autocomplete="off" />
          </div>
        </section>

        <section class="control-block">
          <label>分类</label>
          <div id="categoryFilters" class="filter-list" role="list"></div>
        </section>

        <section class="control-block">
          <label>标签</label>
          <div id="tagFilters" class="tag-cloud" role="list"></div>
        </section>
      </aside>

      <section class="workspace" aria-label="知识库内容">
        <div class="toolbar">
          <div>
            <p class="eyebrow">Knowledge Base</p>
            <h2 id="resultTitle">全部条目</h2>
          </div>
          <div class="stats" aria-live="polite">
            <strong id="resultCount">0</strong>
            <span>条匹配</span>
          </div>
        </div>

        <form id="quickAddForm" class="quick-add" autocomplete="off">
          <div class="form-grid">
            <label>
              标题
              <input name="title" required placeholder="例如：查看当前 Git 分支" />
            </label>
            <label>
              分类
              <select name="category" required>
                <option value="Mac">Mac</option>
                <option value="GitHub / Git">GitHub / Git</option>
                <option value="Shell">Shell</option>
                <option value="其他">其他</option>
              </select>
            </label>
            <label>
              标签
              <input name="tags" placeholder="用逗号分隔，例如 git, branch" />
            </label>
          </div>
          <label>
            内容
            <textarea name="body" required placeholder="记录命令、快捷键、使用场景或注意事项"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit">添加到本机知识库</button>
            <button type="button" id="clearLocalBtn" class="ghost">清空本机新增</button>
          </div>
        </form>

        <div id="entries" class="entry-list"></div>
        <p id="emptyState" class="empty-state" hidden>没有找到匹配内容，换个关键词试试。</p>
      </section>
    </main>

    <template id="entryTemplate">
      <article class="entry-card">
        <div class="entry-head">
          <div>
            <p class="entry-category"></p>
            <h3></h3>
          </div>
          <button class="copy-btn" type="button" title="复制内容" aria-label="复制内容">⧉</button>
        </div>
        <p class="entry-body"></p>
        <pre class="entry-code" hidden><code></code></pre>
        <div class="entry-tags"></div>
      </article>
    </template>

    <script src="./data/entries.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
